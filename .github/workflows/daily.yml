# ============================================================
# Oslo Screener Dashboard — Daily update
#
# Runs on weekdays at 07:00 UTC (≈ 09:00 Oslo time),
# after oslo-screener has published the latest CSV.
# ============================================================

name: Daily Dashboard

on:
  schedule:
    - cron: "0 7 * * 1-5"   # 07:00 UTC weekdays
  workflow_dispatch:          # Manual trigger from GitHub Actions

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install Pillow

      - name: Generate dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate.py --output site/index.html

      - name: Commit ticker cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git diff --staged --quiet || git commit -m "chore: update ticker cache [skip ci]"
          git push || true

      - name: Copy static files
        run: |
          cp manifest.json site/manifest.json
          cp robots.txt site/robots.txt

      - name: Generate app icons
        run: python make_icons.py

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
