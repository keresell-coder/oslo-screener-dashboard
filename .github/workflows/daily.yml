# ============================================================
# Oslo Screener Dashboard — Daglig oppdatering
#
# PLASSERING I NY REPO: .github/workflows/daily.yml
#
# Kjøres hverdager kl. 07:00 UTC (≈ 09:00 Oslo-tid),
# etter at oslo-screener har kjørt og publisert latest.csv.
# ============================================================

name: Daglig Dashboard

on:
  schedule:
    - cron: "0 7 * * 1-5"   # 07:00 UTC hverdager
  workflow_dispatch:         # Manuell kjøring fra GitHub Actions-siden

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer avhengigheter
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install Pillow  # for ikongenering

      - name: Generer dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate.py --output site/index.html

      - name: Kopier statiske filer
        run: |
          cp manifest.json site/manifest.json
          cp robots.txt site/robots.txt

      - name: Generer app-ikoner
        run: python make_icons.py

      - name: Last opp site-artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
