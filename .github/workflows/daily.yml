# ============================================================
# Oslo Screener Dashboard — Daily update
#
# Runs on weekdays at 07:00 UTC (≈ 09:00 Oslo time),
# after oslo-screener has published the latest CSV.
# Deploys by pushing generated site/ to the gh-pages branch.
# ============================================================

name: Daily Dashboard

on:
  schedule:
    - cron: "0 7 * * 1-5"   # 07:00 UTC weekdays
  workflow_dispatch:          # Manual trigger from GitHub Actions

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install Pillow

      - name: Generate dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate.py --output site/index.html

      - name: Commit ticker cache to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update ticker cache [skip ci]"
          git push origin main || true

      - name: Copy static files and generate icons
        run: |
          cp manifest.json site/manifest.json
          cp robots.txt site/robots.txt
          python make_icons.py
          touch site/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          commit_message: "deploy: update dashboard [skip ci]"
          force_orphan: false
